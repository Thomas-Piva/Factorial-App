<!DOCTYPE html>

<html lang="it"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Calendario - Erboristeria</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-bright": "#fcf9f4",
              "surface-tint": "#446647",
              "on-primary-fixed": "#002109",
              "primary": "#234428",
              "tertiary-fixed-dim": "#b1cdc1",
              "surface-container-low": "#f6f3ee",
              "secondary": "#4c6450",
              "on-tertiary-container": "#b4cfc4",
              "surface-container-high": "#ebe8e3",
              "surface-variant": "#e5e2dd",
              "primary-fixed": "#c5edc5",
              "inverse-on-surface": "#f3f0eb",
              "primary-fixed-dim": "#a9d0aa",
              "outline-variant": "#c2c8bf",
              "on-secondary": "#ffffff",
              "on-background": "#1c1c19",
              "on-secondary-fixed": "#092011",
              "on-tertiary-fixed": "#072019",
              "surface": "#fcf9f4",
              "on-primary-container": "#acd3ad",
              "tertiary": "#2a423a",
              "surface-container-highest": "#e5e2dd",
              "on-secondary-container": "#516a56",
              "background": "#fcf9f4",
              "on-primary-fixed-variant": "#2c4e31",
              "secondary-fixed": "#ceead0",
              "outline": "#737971",
              "surface-container": "#f0ede9",
              "inverse-surface": "#31302d",
              "surface-dim": "#dcdad5",
              "tertiary-container": "#415950",
              "on-surface": "#1c1c19",
              "error-container": "#ffdad6",
              "on-tertiary": "#ffffff",
              "on-secondary-fixed-variant": "#344c3a",
              "on-primary": "#ffffff",
              "on-surface-variant": "#424842",
              "secondary-fixed-dim": "#b2cdb5",
              "tertiary-fixed": "#cde9dd",
              "on-error": "#ffffff",
              "error": "#ba1a1a",
              "inverse-primary": "#a9d0aa",
              "secondary-container": "#ceead0",
              "primary-container": "#3a5c3e",
              "on-tertiary-fixed-variant": "#334c43",
              "on-error-container": "#93000a",
              "surface-container-lowest": "#ffffff"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Manrope"],
              "label": ["Manrope"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Manrope', sans-serif; background-color: #fcf9f4; color: #1c1c19; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body {
          min-height: 100dvh;
          padding-bottom: 96px; /* Space for bottom nav */
        }
    </style>
</head>
<body class="bg-surface selection:bg-primary-fixed">
<main class="max-w-md mx-auto min-h-screen px-6 py-12 flex flex-col">
<!-- Header Section -->
<header class="mb-10 flex items-center justify-between">
<div>
<h1 class="text-3xl font-extrabold text-primary tracking-tighter mb-1">Calendario</h1>
<p class="text-on-surface-variant text-sm font-medium">Prenota la tua consulenza</p>
</div>
<div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center text-primary">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</div>
</header>
<!-- Month Navigation -->
<div class="flex items-center justify-between mb-8 px-2">
<h2 class="text-xl font-bold text-primary">Ottobre 2024</h2>
<div class="flex gap-4">
<button class="w-10 h-10 rounded-full flex items-center justify-center bg-surface-container-low text-secondary hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined" data-icon="chevron_left">chevron_left</span>
</button>
<button class="w-10 h-10 rounded-full flex items-center justify-center bg-surface-container-low text-secondary hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</div>
<!-- Weekly Calendar Selector -->
<section class="mb-10">
<div class="grid grid-cols-7 gap-2">
<!-- Days of the week labels -->
<div class="text-center text-[10px] font-bold uppercase tracking-widest text-on-surface-variant mb-2">Lun</div>
<div class="text-center text-[10px] font-bold uppercase tracking-widest text-on-surface-variant mb-2">Mar</div>
<div class="text-center text-[10px] font-bold uppercase tracking-widest text-on-surface-variant mb-2">Mer</div>
<div class="text-center text-[10px] font-bold uppercase tracking-widest text-on-surface-variant mb-2">Gio</div>
<div class="text-center text-[10px] font-bold uppercase tracking-widest text-on-surface-variant mb-2">Ven</div>
<div class="text-center text-[10px] font-bold uppercase tracking-widest text-on-surface-variant mb-2">Sab</div>
<div class="text-center text-[10px] font-bold uppercase tracking-widest text-on-surface-variant mb-2">Dom</div>
<!-- Calendar Days -->
<button class="aspect-square flex flex-col items-center justify-center rounded-xl bg-surface-container-low text-on-surface-variant opacity-50 cursor-not-allowed">
<span class="text-sm font-bold">14</span>
</button>
<button class="aspect-square flex flex-col items-center justify-center rounded-xl bg-surface-container-low text-on-surface-variant hover:bg-surface-container-high transition-all">
<span class="text-sm font-bold">15</span>
</button>
<button class="aspect-square flex flex-col items-center justify-center rounded-xl bg-primary text-white shadow-lg shadow-primary/20 scale-105">
<span class="text-sm font-bold">16</span>
<div class="w-1 h-1 bg-white rounded-full mt-1"></div>
</button>
<button class="aspect-square flex flex-col items-center justify-center rounded-xl bg-surface-container-low text-on-surface-variant hover:bg-surface-container-high transition-all">
<span class="text-sm font-bold">17</span>
</button>
<button class="aspect-square flex flex-col items-center justify-center rounded-xl bg-surface-container-low text-on-surface-variant hover:bg-surface-container-high transition-all">
<span class="text-sm font-bold">18</span>
</button>
<button class="aspect-square flex flex-col items-center justify-center rounded-xl bg-surface-container-low text-on-surface-variant hover:bg-surface-container-high transition-all">
<span class="text-sm font-bold">19</span>
</button>
<button class="aspect-square flex flex-col items-center justify-center rounded-xl bg-surface-container-low text-on-surface-variant hover:bg-surface-container-high transition-all">
<span class="text-sm font-bold">20</span>
</button>
</div>
</section>
<!-- Availability Card -->
<section class="mb-8">
<div class="bg-surface-container-lowest rounded-3xl p-6 shadow-sm flex items-center justify-between border border-surface-variant/20">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-2xl bg-secondary-fixed flex items-center justify-center text-primary">
<span class="material-symbols-outlined" data-icon="schedule" style="font-variation-settings: 'FILL' 1;">schedule</span>
</div>
<div>
<h3 class="text-primary font-bold">Oggi, 16 Ottobre</h3>
<p class="text-on-surface-variant text-sm font-medium">apertura 08:30 - 14:30</p>
</div>
</div>
<div class="px-3 py-1 bg-primary-fixed text-on-primary-fixed-variant text-[10px] font-bold uppercase tracking-wider rounded-full">
                Aperto
            </div>
</div>
</section>
<!-- Content adjustment: Spacer to fill the screen elegantly since the bottom elements were removed -->
<div class="flex-grow"></div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 right-0 bg-surface-container-low/95 backdrop-blur-lg border-t border-surface-variant/30 px-6 py-4 z-50">
<div class="max-w-md mx-auto flex items-center justify-between">
<button class="flex flex-col items-center gap-1 text-secondary opacity-60">
<span class="material-symbols-outlined text-2xl" data-icon="home">home</span>
<span class="text-[10px] font-bold uppercase tracking-wider">HOME</span>
</button>
<button class="flex flex-col items-center gap-1 text-secondary opacity-60">
<span class="material-symbols-outlined text-2xl" data-icon="inbox">inbox</span>
<span class="text-[10px] font-bold uppercase tracking-wider">INBOX</span>
</button>
<button class="flex flex-col items-center gap-1 text-secondary opacity-60">
<span class="material-symbols-outlined text-2xl" data-icon="calendar_today">calendar_today</span>
<span class="text-[10px] font-bold uppercase tracking-wider">CALEN</span>
</button>
<button class="flex flex-col items-center gap-1 group">
<div class="w-14 h-14 rounded-full bg-primary flex items-center justify-center text-white shadow-lg shadow-primary/20 -mt-8 mb-1">
<span class="material-symbols-outlined text-2xl" data-icon="grid_view">grid_view</span>
</div>
<span class="text-[10px] font-bold text-primary uppercase tracking-wider">HUB</span>
</button>
</div>
</nav>
</body></html>
